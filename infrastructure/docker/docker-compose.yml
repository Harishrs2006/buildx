version: '3.9'

# Local development services for BuildX
# MongoDB: use MongoDB Atlas (cloud) — no local container needed
# Redis: local cache for rate limiting

services:
  redis:
    image: redis:7-alpine
    container_name: buildx_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:

networks:
  default:
    name: buildx_network
